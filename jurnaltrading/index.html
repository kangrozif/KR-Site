<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jurnal Trading — BBMA OA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #12141c;
    --panel: #191c27;
    --panel-alt: #1f2330;
    --border: #2a2e3d;
    --gold: #e3b341;
    --gold-dim: #8a6c2c;
    --profit: #3ed598;
    --profit-dim: #1e4536;
    --loss: #ff6b6b;
    --loss-dim: #4a2323;
    --open: #6c7a94;
    --open-dim: #2b3444;
    --text: #eaecf3;
    --text-muted: #8890a6;
    --text-faint: #565d70;
  }

  * { box-sizing: border-box; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 800px 400px at 20% -10%, rgba(227,179,65,0.06), transparent),
      radial-gradient(ellipse 600px 300px at 90% 0%, rgba(62,213,152,0.04), transparent);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  #root { max-width: 980px; margin: 0 auto; padding: 20px 16px 60px; }

  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .header-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .header-sub .gold-dot { color: var(--gold); }

  .btn {
    background: var(--panel-alt); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: border-color 0.15s, background 0.15s;
  }
  .btn:hover { border-color: var(--gold-dim); background: #232739; }
  .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .btn-spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px;
  }
  @media (max-width: 640px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }

  .stat-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .stat-value.pos { color: var(--profit); }
  .stat-value.neg { color: var(--loss); }
  .stat-sub { font-size: 11px; color: var(--text-faint); margin-top: 3px; }

  .insight-bar {
    background: linear-gradient(90deg, rgba(227,179,65,0.08), rgba(227,179,65,0.02));
    border: 1px solid var(--gold-dim); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 20px; font-size: 13px; color: var(--text);
    display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
  }
  .insight-bar .icon { color: var(--gold); flex-shrink: 0; font-size: 15px; }

  .panel-row { display: grid; grid-template-columns: 1.3fr 1fr; gap: 12px; margin-bottom: 24px; }
  @media (max-width: 720px) { .panel-row { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px;
  }
  .panel-title { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
  .panel-desc { font-size: 11px; color: var(--text-muted); margin: 0 0 14px; }

  .setup-row { margin-bottom: 12px; }
  .setup-row:last-child { margin-bottom: 0; }
  .setup-row-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  .setup-row-name { color: var(--text); font-weight: 500; }
  .setup-row-meta { color: var(--text-muted); }
  .setup-bar-track { height: 6px; background: var(--panel-alt); border-radius: 4px; overflow: hidden; }
  .setup-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

  .emo-chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .emo-chip {
    flex: 1 1 calc(50% - 8px); background: var(--panel-alt); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
  }
  .emo-chip-name { font-size: 11px; color: var(--text-muted); }
  .emo-chip-rate { font-size: 15px; font-weight: 700; margin-top: 2px; }

  .section-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .section-title { font-size: 14px; font-weight: 600; }

  .tabs { display: flex; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .tab {
    border: none; background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 500;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: var(--panel-alt); color: var(--text); }
  .tab:focus-visible { outline: 2px solid var(--gold); outline-offset: 1px; }

  .trade-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .trade-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .trade-pair-row { display: flex; align-items: center; gap: 8px; }
  .trade-arah {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .trade-arah.buy { background: var(--profit-dim); color: var(--profit); }
  .trade-arah.sell { background: var(--loss-dim); color: var(--loss); }
  .trade-pair { font-weight: 600; font-size: 14px; }
  .trade-id { font-size: 10px; color: var(--text-faint); margin-top: 2px; }

  .trade-result {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; text-transform: uppercase;
  }
  .trade-result.profit { background: var(--profit-dim); color: var(--profit); }
  .trade-result.loss { background: var(--loss-dim); color: var(--loss); }
  .trade-result.breakeven { background: var(--panel-alt); color: var(--text-muted); }
  .trade-result.open { background: var(--open-dim); color: var(--open); }

  .trade-meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
  @media (max-width: 480px) { .trade-meta-grid { grid-template-columns: repeat(2, 1fr); } }
  .meta-item-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.04em; }
  .meta-item-value { font-size: 13px; font-weight: 500; margin-top: 2px; }

  .trade-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 6px; }
  .trade-tag { font-size: 11px; color: var(--text-muted); background: var(--panel-alt); padding: 3px 8px; border-radius: 5px; }
  .trade-pl { font-size: 14px; font-weight: 700; }
  .trade-pl.pos { color: var(--profit); }
  .trade-pl.neg { color: var(--loss); }
  .trade-pl.zero { color: var(--text-muted); }

  .empty-state, .loading-state, .error-state {
    text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 13px;
  }
  .error-state { color: var(--loss); }
  .empty-state .icon { font-size: 28px; margin-bottom: 10px; display: block; }

  .footer-note { text-align: center; font-size: 11px; color: var(--text-faint); margin-top: 30px; }

  .cal-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .cal-nav-btn {
    background: var(--panel-alt); border: 1px solid var(--border); color: var(--text);
    width: 28px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; transition: border-color 0.15s;
  }
  .cal-nav-btn:hover { border-color: var(--gold-dim); }
  .cal-nav-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 1px; }
  .cal-month-label { font-size: 13px; font-weight: 600; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-dow { text-align: center; font-size: 10px; color: var(--text-faint); text-transform: uppercase; padding-bottom: 4px; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 7px; border: 1px solid var(--border); background: var(--panel-alt);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: default; font-size: 11px; position: relative; padding: 2px;
  }
  .cal-cell.empty { border: none; background: transparent; }
  .cal-cell.has-trade { cursor: pointer; transition: transform 0.1s, outline 0.1s; }
  .cal-cell.has-trade:hover { transform: scale(1.06); }
  .cal-cell.has-trade:focus-visible { outline: 2px solid var(--gold); outline-offset: 1px; }
  .cal-cell.selected { outline: 2px solid var(--gold); outline-offset: 1px; }
  .cal-cell .cal-date-num { font-size: 10px; color: var(--text-faint); position: absolute; top: 3px; left: 5px; }
  .cal-cell .cal-pl { font-weight: 700; font-size: 11px; margin-top: 6px; }
  .cal-cell.today { border-color: var(--gold-dim); }

  .cal-legend { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 10px; font-size: 10px; color: var(--text-faint); }
  .cal-legend-swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; vertical-align: middle; }

  .cal-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .cal-detail-head { font-size: 12px; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .cal-detail-close { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; }
  .cal-detail-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .cal-detail-row:last-child { border-bottom: none; }
  .cal-detail-row .name { color: var(--text-muted); }

  .eq-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
  .eq-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; flex-wrap: wrap; gap: 8px; }
  .eq-title { font-size: 13px; font-weight: 600; margin: 0; }
  .eq-mini-stats { display: flex; gap: 14px; font-size: 11px; color: var(--text-muted); }
  .eq-mini-stats b { color: var(--text); font-family: 'JetBrains Mono', monospace; }
  .eq-svg-wrap { margin-top: 10px; }
  .eq-empty { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 12px; }
  .eq-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
  .eq-detail .name { color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ============================================================
// GANTI dengan Web App URL GAS kamu (yang sama dipakai di Fase 1-2)
// ============================================================
const API_URL = 'PASTE_WEB_APP_URL_GAS_DI_SINI';

function useTrades() {
  const [trades, setTrades] = useState([]);
  const [status, setStatus] = useState('loading'); // loading | ok | error
  const [lastFetch, setLastFetch] = useState(null);

  const load = useCallback(() => {
    setStatus('loading');
    fetch(API_URL + '?action=getTrades')
      .then(r => r.json())
      .then(json => {
        if (!json.success) throw new Error(json.error || 'Gagal ambil data');
        setTrades(json.data || []);
        setStatus('ok');
        setLastFetch(new Date());
      })
      .catch(() => setStatus('error'));
  }, []);

  useEffect(() => { load(); }, [load]);
  return { trades, status, lastFetch, reload: load };
}

function computeStats(trades) {
  const closed = trades.filter(t => t.Result === 'Profit' || t.Result === 'Loss' || t.Result === 'Breakeven');
  const open = trades.filter(t => t.Result === 'Open' || t.Result === '');
  const wins = closed.filter(t => t.Result === 'Profit');
  const losses = closed.filter(t => t.Result === 'Loss');

  const winRate = closed.length ? (wins.length / closed.length) * 100 : 0;
  const grossProfit = wins.reduce((s, t) => s + (parseFloat(t.PL_USD) || 0), 0);
  const grossLoss = Math.abs(losses.reduce((s, t) => s + (parseFloat(t.PL_USD) || 0), 0));
  const profitFactor = grossLoss > 0 ? grossProfit / grossLoss : (grossProfit > 0 ? Infinity : 0);
  const totalPL = closed.reduce((s, t) => s + (parseFloat(t.PL_USD) || 0), 0);

  return { closedCount: closed.length, openCount: open.length, winRate, profitFactor, totalPL, wins, losses };
}

function computeSetupBreakdown(trades) {
  const closed = trades.filter(t => t.Result === 'Profit' || t.Result === 'Loss' || t.Result === 'Breakeven');
  const groups = {};
  closed.forEach(t => {
    const key = t['Tipe Setup'] || 'Lainnya';
    if (!groups[key]) groups[key] = { total: 0, wins: 0 };
    groups[key].total += 1;
    if (t.Result === 'Profit') groups[key].wins += 1;
  });
  return Object.entries(groups)
    .map(([name, v]) => ({ name, total: v.total, winRate: v.total ? (v.wins / v.total) * 100 : 0 }))
    .sort((a, b) => b.total - a.total);
}

function computeTradingStyleBreakdown(trades) {
  const closed = trades.filter(t => t.Result === 'Profit' || t.Result === 'Loss' || t.Result === 'Breakeven');
  const groups = {};
  closed.forEach(t => {
    const key = t['Tipe Trading'] || 'Belum diisi';
    if (!groups[key]) groups[key] = { total: 0, wins: 0 };
    groups[key].total += 1;
    if (t.Result === 'Profit') groups[key].wins += 1;
  });
  return Object.entries(groups)
    .map(([name, v]) => ({ name, total: v.total, winRate: v.total ? (v.wins / v.total) * 100 : 0 }))
    .sort((a, b) => b.total - a.total);
}

function computeEmotionBreakdown(trades) {
  const closed = trades.filter(t => t.Result === 'Profit' || t.Result === 'Loss' || t.Result === 'Breakeven');
  const groups = {};
  closed.forEach(t => {
    const key = t.Emosi || 'Tanpa label';
    if (!groups[key]) groups[key] = { total: 0, wins: 0 };
    groups[key].total += 1;
    if (t.Result === 'Profit') groups[key].wins += 1;
  });
  return Object.entries(groups)
    .map(([name, v]) => ({ name, total: v.total, winRate: v.total ? (v.wins / v.total) * 100 : 0 }))
    .sort((a, b) => b.total - a.total);
}

function generateInsight(setupBreakdown, emotionBreakdown, stats) {
  if (stats.closedCount < 3) {
    return 'Belum cukup data trade closed buat analisa pola. Tutup beberapa trade lagi lewat /close di bot.';
  }
  const bestSetup = [...setupBreakdown].sort((a, b) => b.winRate - a.winRate)[0];
  const worstEmo = [...emotionBreakdown].filter(e => e.total >= 2).sort((a, b) => a.winRate - b.winRate)[0];

  let parts = [];
  if (bestSetup) parts.push(`Win rate tertinggi ada di setup <b>${bestSetup.name}</b> (${bestSetup.winRate.toFixed(0)}%, ${bestSetup.total}x)`);
  if (worstEmo && worstEmo.winRate < 50) parts.push(`saat emosi <b>${worstEmo.name}</b>, win rate cuma ${worstEmo.winRate.toFixed(0)}% — pola ini layak diwaspadai`);
  return parts.length ? parts.join('. ') + '.' : 'Performa relatif merata di semua setup dan kondisi emosi sejauh ini.';
}

function computeDailyData(trades) {
  // Kelompokkan trade closed per tanggal (berdasarkan Timestamp Exit), total P/L per hari
  const map = {};
  trades
    .filter(t => (t.Result === 'Profit' || t.Result === 'Loss' || t.Result === 'Breakeven') && t['Timestamp Exit'])
    .forEach(t => {
      const d = new Date(t['Timestamp Exit']);
      if (isNaN(d.getTime())) return;
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      if (!map[key]) map[key] = { pl: 0, count: 0, trades: [] };
      map[key].pl += parseFloat(t.PL_USD) || 0;
      map[key].count += 1;
      map[key].trades.push(t);
    });
  return map;
}

function CalendarHeatmap({ trades }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const [selectedKey, setSelectedKey] = useState(null);

  const dailyData = useMemo(() => computeDailyData(trades), [trades]);

  const baseDate = new Date();
  baseDate.setDate(1);
  baseDate.setMonth(baseDate.getMonth() + monthOffset);
  const year = baseDate.getFullYear();
  const month = baseDate.getMonth();
  const monthLabel = baseDate.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

  const firstDayOfMonth = new Date(year, month, 1);
  // Senin = 0 ... Minggu = 6 (kalender Indonesia mulai Senin)
  const startOffset = (firstDayOfMonth.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const todayKey = (() => {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
  })();

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  function keyFor(day) {
    return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  }

  function toneFor(pl) {
    if (pl > 0) return pl > 100 ? { bg: 'rgba(62,213,152,0.28)', border: 'rgba(62,213,152,0.5)', text: 'var(--profit)' }
                                  : { bg: 'rgba(62,213,152,0.14)', border: 'rgba(62,213,152,0.3)', text: 'var(--profit)' };
    if (pl < 0) return pl < -100 ? { bg: 'rgba(255,107,107,0.28)', border: 'rgba(255,107,107,0.5)', text: 'var(--loss)' }
                                   : { bg: 'rgba(255,107,107,0.14)', border: 'rgba(255,107,107,0.3)', text: 'var(--loss)' };
    return { bg: 'var(--panel-alt)', border: 'var(--border)', text: 'var(--text-muted)' };
  }

  const selectedDay = selectedKey ? dailyData[selectedKey] : null;

  return (
    <div className="cal-panel">
      <div className="cal-head">
        <button className="cal-nav-btn" onClick={() => { setMonthOffset(m => m - 1); setSelectedKey(null); }} aria-label="Bulan sebelumnya">‹</button>
        <span className="cal-month-label">🗓️ {monthLabel}</span>
        <button className="cal-nav-btn" onClick={() => { setMonthOffset(m => m + 1); setSelectedKey(null); }} aria-label="Bulan berikutnya">›</button>
      </div>

      <div className="cal-grid">
        {['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'].map(d => <div className="cal-dow" key={d}>{d}</div>)}
        {cells.map((day, i) => {
          if (day === null) return <div className="cal-cell empty" key={'e' + i} />;
          const key = keyFor(day);
          const data = dailyData[key];
          const isToday = key === todayKey;
          if (!data) {
            return (
              <div className={`cal-cell ${isToday ? 'today' : ''}`} key={key}>
                <span className="cal-date-num">{day}</span>
              </div>
            );
          }
          const tone = toneFor(data.pl);
          return (
            <div
              className={`cal-cell has-trade ${isToday ? 'today' : ''} ${selectedKey === key ? 'selected' : ''}`}
              key={key}
              style={{ background: tone.bg, borderColor: tone.border }}
              onClick={() => setSelectedKey(selectedKey === key ? null : key)}
              role="button" tabIndex={0}
              onKeyDown={(e) => { if (e.key === 'Enter') setSelectedKey(selectedKey === key ? null : key); }}
            >
              <span className="cal-date-num">{day}</span>
              <span className="cal-pl mono" style={{ color: tone.text }}>
                {data.pl >= 0 ? '+' : ''}{data.pl.toFixed(0)}
              </span>
            </div>
          );
        })}
      </div>

      <div className="cal-legend">
        <span><span className="cal-legend-swatch" style={{background: 'rgba(255,107,107,0.28)'}}></span>Loss</span>
        <span><span className="cal-legend-swatch" style={{background: 'var(--panel-alt)'}}></span>Kosong</span>
        <span><span className="cal-legend-swatch" style={{background: 'rgba(62,213,152,0.28)'}}></span>Profit</span>
      </div>

      {selectedDay && (
        <div className="cal-detail">
          <div className="cal-detail-head">
            <span>{selectedKey.split('-').reverse().join('/')} · {selectedDay.count} trade</span>
            <button className="cal-detail-close" onClick={() => setSelectedKey(null)} aria-label="Tutup detail">✕</button>
          </div>
          {selectedDay.trades.map(t => (
            <div className="cal-detail-row" key={t.ID}>
              <span className="name">{t.Arah} {t.Pair} · {t['Tipe Setup']}</span>
              <span className="mono" style={{ color: parseFloat(t.PL_USD) >= 0 ? 'var(--profit)' : 'var(--loss)', fontWeight: 700 }}>
                {parseFloat(t.PL_USD) >= 0 ? '+' : ''}${t.PL_USD}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function computeEquityCurve(trades) {
  const closed = trades
    .filter(t => (t.Result === 'Profit' || t.Result === 'Loss' || t.Result === 'Breakeven') && t['Timestamp Exit'])
    .sort((a, b) => new Date(a['Timestamp Exit']) - new Date(b['Timestamp Exit']));

  let running = 0, peak = 0, maxDrawdown = 0;
  const points = closed.map(t => {
    running += parseFloat(t.PL_USD) || 0;
    if (running > peak) peak = running;
    const dd = peak > 0 ? ((peak - running) / peak) * 100 : 0;
    if (dd > maxDrawdown) maxDrawdown = dd;
    return {
      id: t.ID, date: new Date(t['Timestamp Exit']), equity: running,
      pl: parseFloat(t.PL_USD) || 0, arah: t.Arah, pair: t.Pair
    };
  });
  return { points, peak, maxDrawdown, final: running };
}

function EquityCurveChart({ trades }) {
  const [selected, setSelected] = useState(null);
  const { points, peak, maxDrawdown, final } = useMemo(() => computeEquityCurve(trades), [trades]);

  if (points.length === 0) {
    return (
      <div className="eq-panel">
        <div className="eq-head"><h3 className="eq-title">📈 Equity Curve</h3></div>
        <div className="eq-empty">Belum ada trade closed buat digambar kurvanya.</div>
      </div>
    );
  }

  const W = 600, H = 200;
  const padL = 46, padR = 10, padT = 14, padB = 24;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const n = points.length;

  const values = points.map(p => p.equity).concat([0]);
  let minY = Math.min(...values), maxY = Math.max(...values);
  const range = (maxY - minY) || 1;
  minY -= range * 0.12; maxY += range * 0.12;

  const x = i => padL + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
  const y = v => padT + innerH - ((v - minY) / (maxY - minY)) * innerH;
  const zeroY = y(Math.max(minY, Math.min(0, maxY)));
  const bottomY = padT + innerH;

  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(i).toFixed(1)},${y(p.equity).toFixed(1)}`).join(' ');
  const areaPath = `${linePath} L${x(n - 1).toFixed(1)},${bottomY} L${x(0).toFixed(1)},${bottomY} Z`;
  const isPositive = final >= 0;
  const lineColor = isPositive ? 'var(--profit)' : 'var(--loss)';
  const gradId = isPositive ? 'eqGradPos' : 'eqGradNeg';

  return (
    <div className="eq-panel">
      <div className="eq-head">
        <h3 className="eq-title">📈 Equity Curve</h3>
        <div className="eq-mini-stats">
          <span>Puncak <b className="mono">${peak.toFixed(0)}</b></span>
          <span>Max DD <b className="mono">{maxDrawdown.toFixed(1)}%</b></span>
          <span>Saat ini <b className="mono" style={{color: lineColor}}>${final.toFixed(0)}</b></span>
        </div>
      </div>

      <div className="eq-svg-wrap">
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block', overflow: 'visible' }}>
          <defs>
            <linearGradient id="eqGradPos" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#3ed598" stopOpacity="0.35" />
              <stop offset="100%" stopColor="#3ed598" stopOpacity="0" />
            </linearGradient>
            <linearGradient id="eqGradNeg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#ff6b6b" stopOpacity="0.35" />
              <stop offset="100%" stopColor="#ff6b6b" stopOpacity="0" />
            </linearGradient>
          </defs>

          <line x1={padL} y1={zeroY} x2={W - padR} y2={zeroY} stroke="#2a2e3d" strokeDasharray="3,3" />
          <text x={padL - 6} y={zeroY + 3} textAnchor="end" fontSize="9" fill="#565d70" fontFamily="JetBrains Mono, monospace">0</text>
          <text x={padL - 6} y={y(maxY - range * 0.12) + 3} textAnchor="end" fontSize="9" fill="#565d70" fontFamily="JetBrains Mono, monospace">${Math.round(maxY - range * 0.12)}</text>
          <text x={padL - 6} y={y(minY + range * 0.12) + 3} textAnchor="end" fontSize="9" fill="#565d70" fontFamily="JetBrains Mono, monospace">${Math.round(minY + range * 0.12)}</text>

          <path d={areaPath} fill={`url(#${gradId})`} stroke="none" />
          <path d={linePath} fill="none" stroke={lineColor} strokeWidth="2" />

          {points.map((p, i) => (
            <circle
              key={p.id} cx={x(i)} cy={y(p.equity)} r={selected === i ? 5 : 3.5}
              fill="#191c27" stroke={lineColor} strokeWidth="2"
              style={{ cursor: 'pointer' }}
              onClick={() => setSelected(selected === i ? null : i)}
            />
          ))}
        </svg>
      </div>

      {selected !== null && (
        <div className="eq-detail">
          <span className="name">
            {points[selected].id} · {points[selected].date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' })} · {points[selected].arah} {points[selected].pair}
          </span>
          <span className="mono" style={{ fontWeight: 700, color: points[selected].pl >= 0 ? 'var(--profit)' : 'var(--loss)' }}>
            {points[selected].pl >= 0 ? '+' : ''}${points[selected].pl} → equity ${points[selected].equity.toFixed(0)}
          </span>
        </div>
      )}
    </div>
  );
}

function StatCard({ label, value, sub, tone }) {
  return (
    <div className="stat-card">
      <div className="stat-label">{label}</div>
      <div className={`stat-value mono ${tone || ''}`}>{value}</div>
      {sub && <div className="stat-sub">{sub}</div>}
    </div>
  );
}

function SetupPerformancePanel({ data }) {
  const colors = ['#e3b341', '#3ed598', '#7aa2f7', '#c084fc', '#ff6b6b'];
  return (
    <div className="panel">
      <h3 className="panel-title">📊 Performa per Setup</h3>
      <p className="panel-desc">Win rate tiap tipe setup BBMA OA — biar kelihatan mana yang beneran jalan.</p>
      {data.length === 0 && <p style={{fontSize: 12, color: 'var(--text-muted)'}}>Belum ada trade closed.</p>}
      {data.map((s, i) => (
        <div className="setup-row" key={s.name}>
          <div className="setup-row-head">
            <span className="setup-row-name">{s.name}</span>
            <span className="setup-row-meta mono">{s.winRate.toFixed(0)}% · {s.total}x</span>
          </div>
          <div className="setup-bar-track">
            <div className="setup-bar-fill" style={{ width: s.winRate + '%', background: colors[i % colors.length] }} />
          </div>
        </div>
      ))}
    </div>
  );
}

function TradingStylePanel({ data }) {
  const colors = { Scalping: '#7aa2f7', Swing: '#e3b341' };
  return (
    <div className="panel" style={{ marginBottom: 24 }}>
      <h3 className="panel-title">🕐 Performa per Gaya Trading</h3>
      <p className="panel-desc">Win rate Scalping vs Swing — biar tau gaya mana yang lebih works.</p>
      {data.length === 0 && <p style={{fontSize: 12, color: 'var(--text-muted)'}}>Belum ada trade closed.</p>}
      {data.map(s => (
        <div className="setup-row" key={s.name}>
          <div className="setup-row-head">
            <span className="setup-row-name">{s.name}</span>
            <span className="setup-row-meta mono">{s.winRate.toFixed(0)}% · {s.total}x</span>
          </div>
          <div className="setup-bar-track">
            <div className="setup-bar-fill" style={{ width: s.winRate + '%', background: colors[s.name] || '#8890a6' }} />
          </div>
        </div>
      ))}
    </div>
  );
}

function EmotionPanel({ data }) {
  return (
    <div className="panel">
      <h3 className="panel-title">🧠 Emosi vs Hasil</h3>
      <p className="panel-desc">Win rate per kondisi emosi saat entry.</p>
      {data.length === 0 && <p style={{fontSize: 12, color: 'var(--text-muted)'}}>Belum ada data.</p>}
      <div className="emo-chip-row">
        {data.map(e => (
          <div className="emo-chip" key={e.name}>
            <div className="emo-chip-name">{e.name} ({e.total}x)</div>
            <div className="emo-chip-rate mono" style={{ color: e.winRate >= 50 ? 'var(--profit)' : 'var(--loss)' }}>
              {e.winRate.toFixed(0)}%
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TradeCard({ t }) {
  const pl = parseFloat(t.PL_USD);
  const plTone = isNaN(pl) || pl === 0 ? 'zero' : pl > 0 ? 'pos' : 'neg';
  const resultClass = (t.Result || 'open').toLowerCase();
  const arahClass = (t.Arah || '').toLowerCase();
  const date = t['Timestamp Entry'] ? new Date(t['Timestamp Entry']) : null;
  const dateStr = date ? date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';
  const timeStr = date ? date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '';

  return (
    <div className="trade-card">
      <div className="trade-card-top">
        <div>
          <div className="trade-pair-row">
            <span className={`trade-arah ${arahClass}`}>{t.Arah}</span>
            <span className="trade-pair">{t.Pair}</span>
          </div>
          <div className="trade-id mono">{t.ID} · {dateStr} {timeStr}</div>
        </div>
        <span className={`trade-result ${resultClass}`}>{t.Result || 'Open'}</span>
      </div>

      <div className="trade-meta-grid">
        <div>
          <div className="meta-item-label">Setup</div>
          <div className="meta-item-value">{t['Tipe Setup'] || '-'}</div>
        </div>
        <div>
          <div className="meta-item-label">Sesi</div>
          <div className="meta-item-value">{t.Sesi || '-'}</div>
        </div>
        <div>
          <div className="meta-item-label">Entry / SL / TP</div>
          <div className="meta-item-value mono" style={{fontSize: 12}}>{t['Entry Price']} / {t.SL} / {t.TP}</div>
        </div>
        <div>
          <div className="meta-item-label">RRR</div>
          <div className="meta-item-value mono">{t.RRR || '-'}</div>
        </div>
      </div>

      <div className="trade-foot">
        <div style={{display: 'flex', gap: 6, flexWrap: 'wrap'}}>
          {t['Tipe Trading'] && <span className="trade-tag">🕐 {t['Tipe Trading']}</span>}
          {t['Kombinasi TF'] && <span className="trade-tag">📐 {t['Kombinasi TF']}</span>}
          {t.Emosi && <span className="trade-tag">🧠 {t.Emosi}</span>}
          {t['Sesuai Plan'] && <span className="trade-tag">📋 {t['Sesuai Plan'] === 'Ya' ? 'Sesuai plan' : 'Melenceng'}</span>}
        </div>
        <span className={`trade-pl mono ${plTone}`}>
          {isNaN(pl) || pl === 0 ? (t.Result === 'Open' ? '—' : '$0') : (pl > 0 ? `+$${pl}` : `-$${Math.abs(pl)}`)}
        </span>
      </div>
    </div>
  );
}

function App() {
  const { trades, status, lastFetch, reload } = useTrades();
  const [filter, setFilter] = useState('all'); // all | open | closed

  const stats = useMemo(() => computeStats(trades), [trades]);
  const setupBreakdown = useMemo(() => computeSetupBreakdown(trades), [trades]);
  const tradingStyleBreakdown = useMemo(() => computeTradingStyleBreakdown(trades), [trades]);
  const emotionBreakdown = useMemo(() => computeEmotionBreakdown(trades), [trades]);
  const insight = useMemo(() => generateInsight(setupBreakdown, emotionBreakdown, stats), [setupBreakdown, emotionBreakdown, stats]);

  const filteredTrades = useMemo(() => {
    if (filter === 'open') return trades.filter(t => t.Result === 'Open' || t.Result === '');
    if (filter === 'closed') return trades.filter(t => t.Result && t.Result !== 'Open');
    return trades;
  }, [trades, filter]);

  return (
    <div>
      <div className="header">
        <div>
          <h1 className="header-title">Jurnal Trading — BBMA OA</h1>
          <div className="header-sub">
            <span className="gold-dot">●</span> XAUUSD · {stats.closedCount} closed, {stats.openCount} open
            {lastFetch && ` · update ${lastFetch.toLocaleTimeString('id-ID')}`}
          </div>
        </div>
        <button className="btn" onClick={reload} disabled={status === 'loading'}>
          <span className={status === 'loading' ? 'btn-spin' : ''}>⟳</span> Refresh
        </button>
      </div>

      {status === 'loading' && trades.length === 0 && (
        <div className="loading-state">Mengambil data trade…</div>
      )}

      {status === 'error' && (
        <div className="error-state">
          Gagal ambil data. Cek apakah API_URL di kode sudah diganti dengan Web App URL yang benar, dan deployment access-nya "Anyone".
        </div>
      )}

      {status === 'ok' && (
        <React.Fragment>
          <div className="stat-grid">
            <StatCard
              label="Total P/L"
              value={`${stats.totalPL >= 0 ? '+' : '-'}$${Math.abs(stats.totalPL).toFixed(0)}`}
              tone={stats.totalPL >= 0 ? 'pos' : 'neg'}
              sub={`dari ${stats.closedCount} trade closed`}
            />
            <StatCard
              label="Win Rate"
              value={`${stats.winRate.toFixed(0)}%`}
              sub={`${stats.wins.length}W / ${stats.losses.length}L`}
            />
            <StatCard
              label="Profit Factor"
              value={stats.profitFactor === Infinity ? '∞' : stats.profitFactor.toFixed(2)}
              sub={stats.profitFactor >= 1.5 ? 'sehat' : stats.profitFactor >= 1 ? 'tipis' : 'perlu dievaluasi'}
            />
            <StatCard
              label="Trade Open"
              value={stats.openCount}
              sub="menunggu /close"
            />
          </div>

          <div className="insight-bar">
            <span className="icon">💡</span>
            <span dangerouslySetInnerHTML={{ __html: insight }} />
          </div>

          <CalendarHeatmap trades={trades} />

          <EquityCurveChart trades={trades} />

          <TradingStylePanel data={tradingStyleBreakdown} />

          <div className="panel-row">
            <SetupPerformancePanel data={setupBreakdown} />
            <EmotionPanel data={emotionBreakdown} />
          </div>

          <div className="section-title-row">
            <h2 className="section-title">Trade Log</h2>
            <div className="tabs">
              <button className={`tab ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>Semua</button>
              <button className={`tab ${filter === 'open' ? 'active' : ''}`} onClick={() => setFilter('open')}>Open</button>
              <button className={`tab ${filter === 'closed' ? 'active' : ''}`} onClick={() => setFilter('closed')}>Closed</button>
            </div>
          </div>

          {filteredTrades.length === 0 ? (
            <div className="empty-state">
              <span className="icon">📭</span>
              Belum ada trade di kategori ini. Kirim /trade ke bot buat mulai catat.
            </div>
          ) : (
            filteredTrades.map(t => <TradeCard key={t.ID} t={t} />)
          )}

          <div className="footer-note">Jurnal Trading BBMA OA · KR Trade</div>
        </React.Fragment>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
